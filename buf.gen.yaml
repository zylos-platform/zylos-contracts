version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: java_package_prefix
      value: app.zylos.contracts
    - file_option: java_multiple_files
      value: true
    - file_option: java_string_check_utf8
      value: true

# Generation plugins.
plugins:
  - remote: buf.build/protocolbuffers/java:v34.1
    out: proto-artifact/target/generated-sources/buf
  - remote: buf.build/grpc/java
    out: proto-artifact/target/generated-sources/buf

inputs:
  - directory: proto
