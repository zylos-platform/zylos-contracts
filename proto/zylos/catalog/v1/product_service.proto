syntax = "proto3";

package zylos.catalog.v1;

import "google/protobuf/timestamp.proto";
import "zylos/common/v1/money.proto";

// ProductService is the synchronous read/write surface for the Catalog
// bounded context. Reads are served from the CQRS read model; writes mutate the
// MongoDB write model and emit events via the transactional outbox.
service ProductService {
  // GetProduct returns a single product by its identifier.
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
  // ListProducts returns a page of products, optionally filtered by category.
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  // CreateProduct registers a new product in the catalog.
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  // UpdateProduct mutates an existing product.
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
  // GetVariantBySku returns a single SKU to the minimal snapshot.
  rpc GetVariantBySku(GetVariantBySkuRequest) returns (GetVariantBySkuResponse);
  // BatchGetVariantsBySku returns many SKUs in one round trip.
  rpc BatchGetVariantsBySku(BatchGetVariantsBySkuRequest) returns (BatchGetVariantsBySkuResponse);
}

// ProductStatus is the lifecycle state of a product.
enum ProductStatus {
  PRODUCT_STATUS_UNSPECIFIED = 0;
  PRODUCT_STATUS_DRAFT = 1;
  PRODUCT_STATUS_ACTIVE = 2;
  PRODUCT_STATUS_DISCONTINUED = 3;
}

// ProductVariant is a purchasable variation of a product.
message ProductVariant {
  string variant_id = 1;
  string sku = 2;
  map<string, string> attributes = 3;
  zylos.common.v1.Money list_price = 4;
}

// Product is the public representation of a catalog product.
message Product {
  string product_id = 1;
  int64 version = 2;
  string sku = 3;
  string name = 4;
  string description = 5;
  string category_id = 6;
  ProductStatus status = 7;
  zylos.common.v1.Money list_price = 8;
  repeated ProductVariant variants = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message GetProductRequest {
  string product_id = 1;
}
message GetProductResponse {
  Product product = 1;
}

message ListProductsRequest {
  string category_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}
message ListProductsResponse {
  repeated Product products = 1;
  string next_page_token = 2;
}

// CreateProductRequest carries the fields needed to register a product.
message CreateProductRequest {
  string sku = 1;
  string name = 2;
  string description = 3;
  string category_id = 4;
  zylos.common.v1.Money list_price = 5;
  repeated ProductVariant variants = 6;
  // Client-supplied idempotency key; repeated submissions with the same key are de-duplicated.
  string idempotency_key = 7;
}
message CreateProductResponse {
  Product product = 1;
}

message UpdateProductRequest {
  string product_id = 1;
  string name = 2;
  string description = 3;
  string category_id = 4;
  zylos.common.v1.Money list_price = 5;
  repeated ProductVariant variants = 6;
  string idempotency_key = 7;
}
message UpdateProductResponse {
  Product product = 1;
}

// VariantSnapshot is the minimal purchasability and pricing view of a single SKU.
message VariantSnapshot {
  string sku = 1;
  string product_id = 2;
  // Empty when the SKU matches the product itself rather than one of its variants.
  string variant_id = 3;
  string seller_id = 4;
  zylos.common.v1.Money list_price = 5;
  bool purchasable = 6;
  // Aggregate version the snapshot was taken from, so downstream contexts can
  // detect staleness when they re-quote authoritatively.
  int64 catalog_version = 7;
}

message GetVariantBySkuRequest {
  string sku = 1;
}
message GetVariantBySkuResponse {
  VariantSnapshot variant = 1;
}

message BatchGetVariantsBySkuRequest {
  repeated string skus = 1;
}
message BatchGetVariantsBySkuResponse {
  map<string, VariantSnapshot> variants = 1;
}
